# ===============================
# CONFIGURAÇÕES DO BANCO DE DADOS (POSTGRESQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/indicadores_db
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.docker.compose.readiness.wait=always


spring.docker.compose.enabled=false
# ===============================
# CONFIGURAÇÕES DO HIKARI (Pool de conexões padrão do Spring)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
# ===============================
# LOGS PARA DEBUG (Opcional, mas muito recomendado)
# ===============================
# Isso vai printar no console do Java as queries SQL que o Spring Data JDBC estiver executando
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.namedparam.NamedParameterJdbcTemplate=DEBUG