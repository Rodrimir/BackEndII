<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - BackEnd II</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 100px; background-color: #f4f4f4; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .erro { color: red; font-size: 14px; margin-bottom: 10px; }
        .sucesso { color: green; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Entrar</h2>    
        <div th:if="${erro}" class="erro" th:text="${erro}"></div>    
        <div th:if="${mensagem}" class="sucesso" th:text="${mensagem}"></div>
        <form th:action="@{/login}" th:object="${authRequest}" method="post">        
            <label>Código do Usuário:</label>
            <input type="number" th:field="*{id}" required placeholder="123" />          
            <label>Senha:</label>
            <input type="password" th:field="*{senha}" required placeholder="123" />      
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
