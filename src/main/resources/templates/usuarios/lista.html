<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Usuários</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px; background-color: #f4f4f4; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 80%; max-width: 800px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ccc; }
        .btn { padding: 8px 15px; text-decoration: none; border-radius: 4px; color: white; border: none; cursor: pointer; display: inline-block;}
        .btn-primary { background: #007bff; }
        .btn-warning { background: #ffc107; color: black; }
        .btn-danger { background: #dc3545; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-actions">
            <h2>Usuários do Sistema</h2>
            <a th:href="@{/usuarios/novo}" class="btn btn-primary">+ Novo Usuário</a>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Nickname</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${usuarios}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.nome}">teste</td>
                    <td th:text="${user.nickname}">hardcoded</td>
                    <td>
                        <a th:href="@{/usuarios/editar/{id}(id=${user.id})}" class="btn btn-warning">Editar</a>
                        <a th:href="@{/usuarios/deletar/{id}(id=${user.id})}" class="btn btn-danger" onclick="return confirm('Tem certeza que deseja excluir?');">Excluir</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="4" style="text-align: center;">Nenhum usuário cadastrado.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
