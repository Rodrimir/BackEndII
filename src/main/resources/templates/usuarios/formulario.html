<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 100px; background-color: #000000; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .btn-voltar { width: 100%; padding: 10px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; display: block; text-align: center; text-decoration: none; box-sizing: border-box; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 th:text="${usuario.id == null ? 'Novo Usuário' : 'Editar Usuário'}">Cadastrar</h2>    
        
        <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">        
            <input type="hidden" th:field="*{id}" />
            
            <label>Nome Completo:</label>
            <input type="text" th:field="*{nome}" required placeholder="Ex: Rodrigo" />       
             
            <label>Nickname:</label>
            <input type="text" th:field="*{nickname}" required placeholder="Ex: Rodrimir" />      
            
            <button type="submit">Salvar</button>
            <a th:href="@{/usuarios}" class="btn-voltar">Voltar</a>
        </form>
    </div>
</body>
</html>
